<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MUSUBI SOUND</title>
<!-- supabase-only-sync-fixed -->
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#f0ede6;color:#1a1a1a;}

/* 全幅ヘッダー */
.top-header{background:#fff;border-bottom:.5px solid rgba(0,0,0,.08);display:flex;align-items:flex-end;justify-content:center;overflow:hidden;min-height:160px;padding:0 2rem;}
.th-inner{display:flex;align-items:flex-end;gap:1.5rem;max-width:560px;width:100%;padding-bottom:1.5rem;}
.th-girl{flex-shrink:0;align-self:flex-end;}
.th-girl img{width:160px;height:auto;display:block;}
.th-text{flex:1;min-width:0;}
.th-balloon{font-size:10px;color:#888;line-height:1.7;font-style:italic;margin-bottom:8px;}
.th-brand{font-family:Georgia,serif;font-size:32px;font-weight:700;letter-spacing:.05em;line-height:1;}
.th-sub{font-size:8px;letter-spacing:.28em;color:#bbb;margin-top:8px;text-transform:uppercase;}
.th-hr{border:none;border-top:.5px solid rgba(0,0,0,.12);margin:10px 0;}
.th-prog{font-size:12px;color:#666;}
.th-prog strong{font-size:15px;color:#1a1a1a;}

/* レイアウト */
.layout{display:flex;min-height:calc(100vh - 160px);}
.sidebar{width:220px;flex-shrink:0;background:#fff;border-right:.5px solid rgba(0,0,0,.08);padding:.75rem;}
.main{flex:1;padding:1.25rem;overflow-y:auto;}
.mobile-tab{display:none;}

/* サイドバー */
.s-logo{font-size:11px;font-weight:800;letter-spacing:.08em;padding:.5rem .5rem .75rem;border-bottom:.5px solid rgba(0,0,0,.08);margin-bottom:.5rem;}
.nav-lbl{font-size:9px;letter-spacing:.2em;color:#bbb;text-transform:uppercase;padding:.5rem .5rem .25rem;display:block;}
.nav-btn{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;border-radius:8px;cursor:pointer;font-size:12px;color:#666;margin-bottom:2px;transition:all .15s;border:none;background:transparent;width:100%;text-align:left;font-family:inherit;}
.nav-btn:hover{background:#f5f2ec;color:#1a1a1a;}
.nav-btn.on{background:#1a1a1a;color:#fff;}
.nav-num{margin-left:auto;font-size:9px;background:rgba(0,0,0,.08);color:#666;padding:1px 6px;border-radius:8px;}
.nav-btn.on .nav-num{background:rgba(255,255,255,.2);color:#fff;}

/* Next Up */
.next-card{background:#fff;border:.5px solid rgba(0,0,0,.08);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:1rem;cursor:pointer;transition:border-color .15s;}
.next-card:hover{border-color:rgba(0,0,0,.25);}
.nx-lbl{font-size:9px;letter-spacing:.25em;color:#aaa;text-transform:uppercase;margin-bottom:3px;}
.nx-num{font-size:10px;color:#bbb;}
.nx-ttl{font-size:14px;font-weight:700;margin-top:2px;}

/* フィルター */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.fil{font-size:11px;padding:4px 12px;border-radius:16px;border:.5px solid rgba(0,0,0,.12);background:transparent;cursor:pointer;color:#666;font-family:inherit;transition:all .15s;}
.fil.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}

/* グリッド */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.card{background:#fff;border:.5px solid rgba(0,0,0,.1);border-radius:10px;padding:12px;cursor:pointer;transition:all .15s;}
.card:hover{border-color:rgba(0,0,0,.3);}
.c-num{font-size:10px;color:#bbb;letter-spacing:.1em;font-weight:600;}
.c-ttl{font-size:12px;font-weight:600;margin:4px 0 8px;line-height:1.35;min-height:32px;}
.bdg{font-size:9px;padding:2px 7px;border-radius:8px;display:inline-block;font-weight:600;}
.b0{background:#f0eee8;color:#6b6862;}.b1{background:#fef3d8;color:#7a5a10;}
.b2{background:#fce8d0;color:#7a3a10;}.b3{background:#fddde8;color:#7a1040;}
.b4{background:#ddeeff;color:#104080;}.b5{background:#1a1a1a;color:#f5f0e6;}

/* 詳細 */
.det-top{background:#fff;border:.5px solid rgba(0,0,0,.1);border-radius:12px;padding:1rem 1.25rem;display:flex;align-items:center;gap:1rem;margin-bottom:1rem;}
.det-img{width:52px;height:auto;flex-shrink:0;}
.det-num{font-size:10px;color:#bbb;letter-spacing:.15em;}
.det-ttl{font-size:16px;font-weight:700;margin-top:3px;line-height:1.3;}
.bk{display:inline-flex;align-items:center;gap:4px;background:#f0ede6;border:none;cursor:pointer;font-size:11px;color:#666;padding:4px 10px;border-radius:6px;font-family:inherit;font-weight:600;margin-bottom:6px;transition:all .15s;}
.bk:hover{background:#e0ddd6;color:#1a1a1a;}

.sr{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1rem;}
.sp{font-size:11px;padding:5px 12px;border-radius:18px;border:1.5px solid #e0dbd2;background:#f5f2ec;color:#aaa;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s;}
.s0{background:#e8e5de;color:#4a4844;border-color:#b0ada5;}
.s1{background:#fef3d8;color:#6a4a10;border-color:#e8c840;}
.s2{background:#fce8d0;color:#5a3a10;border-color:#e09040;}
.s3{background:#fddde8;color:#6a1040;border-color:#e06090;}
.s4{background:#ddeeff;color:#104080;border-color:#60a0e0;}
.s5{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.sp-done{background:#e8f5e9;color:#2e7d32;border-color:#81c784;}

.panel{background:#fff;border:.5px solid rgba(0,0,0,.08);border-radius:12px;margin-bottom:.75rem;overflow:hidden;}
.p-hdr{padding:.625rem 1rem;background:#faf8f4;border-bottom:.5px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;}
.p-ttl{font-size:9px;letter-spacing:.2em;color:#999;text-transform:uppercase;font-weight:700;}
.p-body{padding:.875rem 1rem;}
.bulk-ta{width:100%;min-height:80px;padding:8px 10px;border:.5px solid rgba(0,0,0,.12);border-radius:8px;font-family:inherit;font-size:12px;resize:vertical;background:#faf8f4;color:#1a1a1a;outline:none;}
.bulk-ta:focus{border-color:#888;}
.run-btn{display:block;margin:8px 0 0 auto;background:#1a1a1a;color:#fff;border:none;padding:7px 16px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:700;}
.run-btn:hover{background:#333;}
.cp-btn{font-size:10px;padding:3px 9px;border-radius:5px;border:.5px solid rgba(0,0,0,.12);background:transparent;cursor:pointer;color:#666;font-family:inherit;display:inline-flex;align-items:center;gap:3px;font-weight:600;}
.cp-btn:hover{background:#f5f2ec;}
.cp-btn.done{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.pm{margin-bottom:12px;}
.pm-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.pm-lbl{font-size:11px;font-weight:700;color:#444;}
.f-ta{width:100%;min-height:52px;padding:7px 10px;border:.5px solid rgba(0,0,0,.1);border-radius:8px;font-family:inherit;font-size:12px;resize:vertical;background:#fff;color:#444;line-height:1.6;outline:none;}
.f-ta:focus{border-color:#888;}
.f-in{width:100%;padding:7px 10px;border:.5px solid rgba(0,0,0,.1);border-radius:8px;font-family:inherit;font-size:13px;color:#1a1a1a;outline:none;font-weight:600;}
.f-in:focus{border-color:#888;}
.lrow{display:flex;gap:7px;align-items:center;margin-bottom:8px;}
.l-in{flex:1;padding:6px 10px;border:.5px solid rgba(0,0,0,.1);border-radius:8px;font-family:inherit;font-size:11px;color:#444;min-width:0;outline:none;}
.l-in:focus{border-color:#888;}
.l-btn{background:transparent;border:.5px solid rgba(0,0,0,.12);padding:5px 11px;border-radius:7px;cursor:pointer;font-size:11px;color:#666;font-family:inherit;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:3px;font-weight:600;}
.l-btn:hover{background:#f5f2ec;}
.l-btn.dis{opacity:.3;pointer-events:none;}
.done-wrap{padding:1rem 0 .5rem;}
.done-btn{width:100%;background:#1a1a1a;color:#fff;border:none;padding:13px;border-radius:10px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:700;}
.done-btn:hover{background:#333;}
.done-btn.is-done{background:#f5f0e8;color:#1a1a1a;border:.5px solid rgba(0,0,0,.12);}
.toast{background:#1a1a1a;color:#fff;font-size:11px;padding:5px 12px;border-radius:6px;display:inline-block;opacity:0;transition:opacity .2s;margin:7px 0 0;}
.toast.show{opacity:1;}
.base-box{background:#faf8f4;border:.5px solid rgba(0,0,0,.1);border-radius:8px;padding:.75rem 1rem;font-size:11px;color:#555;line-height:1.7;white-space:pre-wrap;max-height:180px;overflow-y:auto;}
.scene-ta{width:100%;min-height:80px;padding:7px 10px;border:.5px solid rgba(0,0,0,.1);border-radius:8px;font-family:inherit;font-size:12px;resize:vertical;background:#fff;color:#444;line-height:1.6;outline:none;margin-top:4px;}

/* レスポンシブ */
@media(max-width:680px){
  .top-header{min-height:130px;}
  .th-girl img{width:110px;}
  .th-brand{font-size:24px;}
  .layout{flex-direction:column;padding-bottom:64px;}
  .sidebar{display:none;}
  .grid{grid-template-columns:repeat(2,1fr);}
  .main{padding:1rem;}
  .mobile-tab{display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:.5px solid rgba(0,0,0,.08);z-index:100;height:62px;}
  .mt-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:none;background:transparent;font-family:inherit;font-size:9px;color:#999;padding:8px 4px;}
  .mt-item.on{color:#1a1a1a;}
  .mt-item svg{width:20px;height:20px;}
}
@media(min-width:681px) and (max-width:960px){
  .grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

function newEp(i) {
  var n = String(i+1).padStart(3,'0');
  return {num:n,title:'',bulk:'',scene:'',sA:'',sB:'',sC:'',ytTitle:'',desc:'',tags:'',driveUrl:'',ytUrl:'',status:'todo'};
}

var eps = [], flt = 'all', sel = null;
var syncing = false;

function dbToEp(row){
  var idx = Math.max(0, Number(row.num || 1) - 1);
  var ep = newEp(idx);
  ep.num = row.num || ep.num;
  ep.title = row.title || '';
  ep.bulk = row.bulk || '';
  ep.scene = row.scene || '';
  ep.sA = row.sa || row.sA || '';
  ep.sB = row.sb || row.sB || '';
  ep.sC = row.sc || row.sC || '';
  ep.ytTitle = row.yttitle || row.ytTitle || '';
  ep.desc = row.description || row.desc || '';
  ep.tags = row.tags || '';
  ep.driveUrl = row.driveurl || row.driveUrl || '';
  ep.ytUrl = row.yturl || row.ytUrl || '';
  ep.status = row.status || 'todo';
  return ep;
}

function epToDb(ep){
  return {
    num: ep.num,
    title: ep.title || '',
    bulk: ep.bulk || '',
    scene: ep.scene || '',
    sa: ep.sA || '',
    sb: ep.sB || '',
    sc: ep.sC || '',
    yttitle: ep.ytTitle || '',
    description: ep.desc || '',
    tags: ep.tags || '',
    driveurl: ep.driveUrl || '',
    yturl: ep.ytUrl || '',
    status: ep.status || 'todo',
    updated_at: new Date().toISOString()
  };
}

function setSyncMessage(msg){
  var el = document.getElementById('sync-msg');
  if (el) el.textContent = msg || '';
}

async function ensureThirtyRows(client, rows){
  var map = {};
  (rows || []).forEach(function(r){ map[String(r.num).padStart(3,'0')] = true; });

  var missing = [];
  for (var i = 0; i < 30; i++) {
    var n = String(i + 1).padStart(3,'0');
    if (!map[n]) missing.push(epToDb(newEp(i)));
  }

  if (missing.length > 0) {
    var ins = await client.from('episodes').upsert(missing, { onConflict: 'num' });
    if (ins.error) {
      console.warn('Supabase initial rows error:', ins.error);
      setSyncMessage('Supabase初期化エラー');
      return rows || [];
    }
    var again = await client.from('episodes').select('*').order('num', { ascending: true });
    if (!again.error && again.data) return again.data;
  }

  return rows || [];
}

async function load() {
  document.getElementById('hgirl').src = GIRL;

  var client = initSupabase();
  if (!client) {
    eps = [];
    for (var i = 0; i < 30; i++) eps.push(newEp(i));
    setSyncMessage('Supabase未接続');
    home();
    return;
  }

  setSyncMessage('Supabase読み込み中...');

  try {
    var res = await client.from('episodes').select('*').order('num', { ascending: true });

    if (res.error) {
      console.warn('Supabase load error:', res.error);
      eps = [];
      for (var a = 0; a < 30; a++) eps.push(newEp(a));
      setSyncMessage('Supabase読込エラー');
      home();
      return;
    }

    var rows = await ensureThirtyRows(client, res.data || []);
    eps = rows.map(dbToEp);

    var existing = {};
    eps.forEach(function(ep){ existing[ep.num] = true; });
    for (var b = 0; b < 30; b++) {
      var n = String(b + 1).padStart(3,'0');
      if (!existing[n]) eps.push(newEp(b));
    }
    eps.sort(function(a,b){ return Number(a.num) - Number(b.num); });

    setSyncMessage('Supabase同期中');
    home();
  } catch(e) {
    console.warn('Supabase load failed:', e);
    eps = [];
    for (var c = 0; c < 30; c++) eps.push(newEp(c));
    setSyncMessage('Supabase接続エラー');
    home();
  }
}

var _saveTimer = null;
function saveEp(ep) {
  // localStorage にもバックアップ
  try { localStorage.setItem('musubi-s1', JSON.stringify(eps)); } catch(e) {}

  var client = initSupabase();
  if (!client) { setSyncMessage('未接続'); return; }

  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async function(){
    try {
      setSyncMessage('保存中...');
      var res = await client.from('episodes').upsert([epToDb(ep)], { onConflict: 'num' });
      if (res.error) {
        console.warn('Supabase save error:', res.error);
        setSyncMessage('保存エラー');
      } else {
        setSyncMessage('✓ 保存済み');
        setTimeout(function(){ setSyncMessage(''); }, 2000);
      }
    } catch(e) {
      console.warn('Supabase save failed:', e);
      setSyncMessage('保存失敗');
    }
  }, 400);
}

async function reloadFromSupabase(){
  await load();
}

function getSt(k) {
  for (var i=0;i<ST.length;i++) if(ST[i].k===k) return ST[i];
  return ST[0];
}
function getNext() {
  for (var i=0;i<eps.length;i++) if(eps[i].status!=='done') return eps[i];
  return eps[0];
}
function esc(s) {
  return String(s==null?'':s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});
}
function escA(s) {
  return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});
}

// ━━ パーサー ━━
function parseBulk(t) {
  var r = {};
  if (!t) return r;

  // セクション抽出: ━━━━━━ ④概要欄（EN＋JP） ━━━━━━ のような1行見出しを基準にする
  // ③/④/⑤は番号だけでも認識するので、表記ゆれに強い
  function getSec(keyword) {
    var lines = t.split('\n');
    var found = false;
    var buf = [];

    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];

      if (!found) {
        if (line.indexOf('━') >= 0 && line.indexOf(keyword) >= 0) {
          found = true;
        }
      } else {
        // 次の ━━━━━ 見出しが来たら終了
        if (line.replace(/[^━]/g,'').length >= 5) break;
        buf.push(line);
      }
    }

    return buf.join('\n').trim();
  }

  r.title   = getSec('タイトル');
  r.ytTitle = getSec('③');
  r.desc    = getSec('④');
  r.tags    = getSec('⑤');

  // 今回のシーン：通常表記と「追加」表記の両方を許可
  var si = t.indexOf('【今回のシーン】');
  if (si < 0) {
    si = t.indexOf('【今回のシーン追加】');
  }

  if (si >= 0) {
    var rest = t.slice(si);
    var ni = rest.search(/\n━{5}/);
    r.scene = (ni >= 0 ? rest.slice(0, ni) : rest).trim();
  }

  // Suno A/B/C
  function getSuno(label, next) {
    var li = t.indexOf(label);
    if (li < 0) return '';

    var rest = t.slice(li + label.length);
    var ni = next ? rest.indexOf(next) : -1;
    var ni2 = rest.search(/\n━{5}/);
    var end = -1;

    if (ni >= 0 && ni2 >= 0) end = Math.min(ni, ni2);
    else if (ni >= 0) end = ni;
    else if (ni2 >= 0) end = ni2;

    return (end >= 0 ? rest.slice(0, end) : rest).trim();
  }

  r.sA = getSuno('【A', '【B');
  r.sB = getSuno('【B', '【C');
  r.sC = getSuno('【C', null);

  return r;
}


function updProgress() {
  var done = eps.filter(function(x){return x.status==='done';}).length;
  document.getElementById('prog-txt').innerHTML = '<strong>' + done + '</strong> / 30 完了';
  document.getElementById('nb').textContent = '30';
}

function setNav(k) {
  var map = {all:0, todo:1, edit:2, done:3};
  var idx = map[k] !== undefined ? map[k] : 0;
  for (var i=0;i<4;i++) {
    var d = document.getElementById('nd'+i);
    var m = document.getElementById('mt'+i);
    if (d) d.classList.toggle('on', i===idx);
    if (m) m.classList.toggle('on', i===idx);
  }
}

function showFlt(f) { flt = f; setNav(f); home(); }

function home() {
  document.getElementById('v-home').style.display = 'block';
  document.getElementById('v-det').style.display = 'none';
  sel = null;
  updProgress();

  var nx = getNext();
  document.getElementById('nx-num').textContent = 'EP ' + nx.num;
  document.getElementById('nx-ttl').textContent = nx.title || '（タイトル未設定）';
  document.getElementById('nx-card').onclick = function(){ openDet(nx.num); };

  var fls = [{k:'all',l:'すべて'}].concat(ST);
  document.getElementById('fil-row').innerHTML = fls.map(function(f){
    return '<button class="fil ' + (flt===f.k?'on':'') + '" data-f="'+f.k+'">'+f.l+'</button>';
  }).join('');
  document.querySelectorAll('.fil').forEach(function(b){
    b.onclick = function(){ flt = b.dataset.f; home(); };
  });

  var list = flt==='all' ? eps : eps.filter(function(x){ return x.status===flt; });
  document.getElementById('ep-grid').innerHTML = list.length
    ? list.map(function(ep){
        var st = getSt(ep.status);
        return '<div class="card" data-n="'+ep.num+'"><p class="c-num">'+ep.num+'</p>'
          +'<p class="c-ttl">'+(esc(ep.title)||'—')+'</p>'
          +'<span class="bdg '+st.b+'">'+st.l+'</span></div>';
      }).join('')
    : '<p style="font-size:12px;color:#bbb;padding:16px">該当なし</p>';

  document.querySelectorAll('.card').forEach(function(c){
    c.onclick = function(){ openDet(c.dataset.n); };
  });
}

function openDet(num) {
  sel = num;
  var ep = null;
  for (var i=0;i<eps.length;i++) if(eps[i].num===num){ ep=eps[i]; break; }
  if (!ep) return;

  document.getElementById('v-home').style.display = 'none';
  var dv = document.getElementById('v-det');
  dv.style.display = 'block';
  updProgress();

  var curIdx = 0;
  for (var si = 0; si < ST.length; si++) { if (ST[si].k === ep.status) { curIdx = si; break; } }
  var sH = ST.map(function(s, idx){
    var isDone = idx < curIdx;
    var isCur = s.k === ep.status;
    var cls = 'sp ' + (isCur ? s.s : (isDone ? 'sp-done' : ''));
    return '<button class="'+cls+'" data-s="'+s.k+'">'+(isDone?'✓ ':'')+s.l+'</button>';

  var bkIco = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>';

  dv.innerHTML =
    '<div class="det-top">'
      +'<img class="det-img" src="'+GIRL+'" alt="">'
      +'<div style="flex:1;min-width:0">'
        +'<button class="bk" id="bk-btn">'+bkIco+' 一覧に戻る</button>'
        +'<p class="det-num">EP '+ep.num+'</p>'
        +'<p class="det-ttl" id="d-ttl">'+(esc(ep.title)||'（タイトル未設定）')+'</p>'
      +'</div>'
    +'</div>'
    +'<div class="sr" id="sr-row">'+sH+'</div>'

    // ChatGPT貼り付け
    +'<div class="panel"><div class="p-hdr"><p class="p-ttl">ChatGPT出力を丸ごと貼り付け</p></div><div class="p-body">'
      +'<textarea class="bulk-ta" id="bulk-ta" placeholder="ChatGPTの出力をここに丸ごと貼り付け...">'+esc(ep.bulk)+'</textarea>'
      +'<button class="run-btn" id="run-btn">振り分け実行</button>'
      +'<p class="toast" id="toast-msg">✓ 振り分け完了</p>'
    +'</div></div>'

    // タイトル
    +'<div class="panel"><div class="p-hdr"><p class="p-ttl">タイトル</p></div><div class="p-body">'
      +'<input class="f-in" type="text" data-f="title" value="'+escA(ep.title)+'" placeholder="Morning Cafe Jazz ☕ 朝のカフェ時間">'
    +'</div></div>'

    // 基本画像プロンプト
    +'<div class="panel"><div class="p-hdr"><p class="p-ttl">① 基本画像プロンプト（固定）</p>'
      +'<button class="cp-btn" id="base-cp">'+cpIco+' コピー</button>'
    +'</div><div class="p-body">'
      +'<div class="base-box">'+esc(BASE)+'</div>'
      +'<p style="font-size:10px;color:#aaa;margin-top:4px">※ このプロンプトの後に今回のシーンを追加して使用</p>'
    +'</div></div>'

    // 今回のシーン
    +'<div class="panel"><div class="p-hdr"><p class="p-ttl">① 今回のシーン</p>'
      +'<button class="cp-btn" id="scene-cp">'+cpIco+' 全文コピー</button>'
    +'</div><div class="p-body">'
      +'<p style="font-size:10px;color:#aaa;margin-bottom:3px">全文コピー = 基本プロンプト＋シーンを結合</p>'
      +'<textarea class="scene-ta" data-f="scene" placeholder="【今回のシーン】が自動で入ります">'+esc(ep.scene||'')+'</textarea>'
    +'</div></div>'

    +'<div class="panel"><div class="p-hdr"><p class="p-ttl">② Suno プロンプト</p></div><div class="p-body">'
      +sunoF.map(function(f){
        return '<div class="pm"><div class="pm-hdr"><span class="pm-lbl">'+f.l+'</span>'
          +'<button class="cp-btn" data-cp="'+f.k+'">'+cpIco+' コピー</button></div>'
          +'<textarea class="f-ta" data-f="'+f.k+'">'+esc(ep[f.k])+'</textarea></div>';
      }).join('')
    +'</div></div>'

    // YouTube情報
    +'<div class="panel"><div class="p-hdr"><p class="p-ttl">YouTube 情報</p></div><div class="p-body">'
      +infoF.map(function(f){

    +'</div><div class="p-body">'
      +'<div class="lrow">'
        +'<svg viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" width="16" height="16" style="flex-shrink:0"><path d="M22 16.5L15 4.5H9L2 16.5"/><polyline points="2 16.5 9 19.5 15 19.5 22 16.5"/><line x1="9" y1="4.5" x2="15" y2="19.5"/></svg>'
        +'<input type="url" class="l-in" data-f="driveUrl" value="'+escA(ep.driveUrl)+'" placeholder="EPフォルダ (Google Drive)">'

      +'</div>'
      +'<div class="lrow">'
        +'<svg viewBox="0 0 24 24" fill="none" stroke="#ff4444" stroke-width="2" width="16" height="16" style="flex-shrink:0"><path d="M22.54 6.42a2.78 2.78 0 00-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 00-1.95 1.96A29 29 0 001 12a29 29 0 00.46 5.58A2.78 2.78 0 003.41 19.6C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 001.95-1.95A29 29 0 0023 12a29 29 0 00-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="#ff4444" stroke="none"/></svg>'
        +'<input type="url" class="l-in" data-f="ytUrl" value="'+escA(ep.ytUrl)+'" placeholder="YouTube公開URL">'
        +'<a class="l-btn '+(ep.ytUrl?'':'dis')+'" href="'+escA(ep.ytUrl)+'" target="_blank">'+exIco+' 開く</a>'
      +'</div>'
    +'</div></div>'

    +'<div class="done-wrap"><button class="done-btn '+(ep.status==='done'?'is-done':'')+'" id="done-btn">'
      +(ep.status==='done'?'✓ アップ済み':'アップ済みにする')
    +'</button></div>';

  // イベント設定
  document.getElementById('bk-btn').onclick = home;

  document.getElementById('done-btn').onclick = function(){
    ep.status = ep.status==='done' ? 'edit' : 'done';
    saveEp(ep); openDet(num);
  };

  document.querySelectorAll('#sr-row .sp').forEach(function(p){
    p.onclick = function(){
      var ns = p.dataset.s;
      ep.status = (ep.status===ns && ns!=='todo') ? 'todo' : ns;
      saveEp(ep); openDet(num);
    };
  });

  document.getElementById('run-btn').onclick = function(){
    var bulk = document.getElementById('bulk-ta').value;
    ep.bulk = bulk;
    var parsed = parseBulk(bulk);
    if (parsed.title)    { ep.title   = parsed.title;   }
    if (parsed.scene)    { ep.scene   = parsed.scene;   }
    if (parsed.sA)       { ep.sA      = parsed.sA;      }
    if (parsed.sB)       { ep.sB      = parsed.sB;      }
    if (parsed.sC)       { ep.sC      = parsed.sC;      }
    if (parsed.ytTitle)  { ep.ytTitle = parsed.ytTitle; }
    if (parsed.desc)     { ep.desc    = parsed.desc;    }
    if (parsed.tags)     { ep.tags    = parsed.tags;    }
    saveEp(ep);
    openDet(num);
    var t = document.getElementById('toast-msg');
    if (t) { t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); }, 2000); }
  };

  dv.querySelectorAll('[data-f]').forEach(function(el){
    el.addEventListener('blur', function(){
      ep[el.dataset.f] = el.value;
      if (el.dataset.f === 'title') {

        if (tt) tt.textContent = el.value || '（タイトル未設定）';
      }
      saveEp(ep);
    });
  });

  document.getElementById('base-cp').onclick = function(){

      }).catch(function(){});
    };

}
